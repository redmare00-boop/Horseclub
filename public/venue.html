<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Площадка — Horseclub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1 id="venue-title">Площадка</h1>
  <div class="user-info">
    <a href="/" class="chat-link">← Площадки</a>
    <span id="user-name"></span>
    <a href="/admin-users.html" class="chat-link" id="admin-users-link" style="display:none">Пользователи</a>
    <a href="/admin-venues.html" class="chat-link" id="admin-venues-link" style="display:none">Площадки</a>
    <a href="/chat.html" class="chat-link">Чат</a>
    <button id="logout-btn">Выйти</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<div class="schedule-wrap" style="max-width:980px;margin:0 auto">
  <div class="login-card" style="width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px">
      <button id="cal-prev" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer">←</button>
      <div style="font-size:15px;font-weight:500" id="cal-title"></div>
      <button id="cal-next" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer">→</button>
    </div>
    <div id="calendar" class="calendar"></div>
  </div>

  <div class="login-card" style="width:100%;margin-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-size:15px;font-weight:500" id="day-title">Выберите дату</div>
        <div class="login-sub" style="margin:6px 0 0">Нажмите на время, чтобы посмотреть записи и добавить свою</div>
      </div>
      <button id="today-btn" style="padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer">Сегодня</button>
    </div>
    <div style="margin-top:12px" id="day-grid"></div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Новая запись</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Дата</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Время</label>
        <select id="f-time"></select>
      </div>
    </div>
    <div class="field">
      <label>Продолжительность</label>
      <select id="f-dur">
        <option value="30">30 мин</option>
        <option value="45">45 мин</option>
        <option value="60" selected>60 мин</option>
        <option value="90">90 мин</option>
      </select>
    </div>
    <div class="field">
      <label>Лошадь</label>
      <input type="text" id="f-horse" placeholder="Кличка лошади">
    </div>
    <div class="field">
      <label>Дисциплина</label>
      <select id="f-disc">
        <option value="Конкур">Конкур</option>
        <option value="Выездка">Выездка</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button id="modal-save">Сохранить</button>
      <button id="modal-cancel">Отмена</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="details-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="details-title">Время</span>
      <button class="modal-close" id="details-close">✕</button>
    </div>
    <div id="details-list" style="margin-bottom:16px"></div>
    <button id="details-add-btn" style="width:100%;padding:9px;background:#534AB7;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer">Добавить свою запись</button>
  </div>
</div>

<script src="venue.js"></script>
</body>
</html>
