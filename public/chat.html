<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Чат — Конный клуб</title>
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="chat-sidebar-head">
      <a href="/" class="back-link">← Расписание</a>
      <div class="chat-sidebar-title-row">
        <span class="chat-sidebar-title">Сообщения</span>
        <button type="button" id="open-user-picker" class="chat-plus" aria-label="Новый чат">+</button>
      </div>
    </div>
    <div class="chat-search">
      <input type="text" id="user-search" placeholder="Найти пользователя...">
      <div id="search-results" class="search-results"></div>
    </div>
    <div class="chat-dialogs" id="dialogs-list"></div>
  </div>

  <div class="chat-main">
    <div class="chat-main-head">
      <button class="chat-back-dialogs" id="back-to-dialogs" type="button" style="display:none">← Чаты</button>
      <div class="chat-main-name" id="chat-title"></div>
    </div>
    <div class="chat-pinned" id="pinned-bar" style="display:none"></div>
    <div class="chat-messages" id="messages-area"></div>
    <div class="chat-input-area">
      <input id="file-input" type="file" multiple style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.rtf,.zip" />
      <button id="attach-btn" type="button" aria-label="Вложение">📎</button>
      <textarea id="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
      <button id="send-btn">→</button>
    </div>
  </div>
</div>

<div id="msg-menu" class="msg-menu" style="display:none">
  <button type="button" id="msg-menu-pin">📌</button>
  <button type="button" id="msg-menu-del" style="display:none">🗑 Удалить</button>
  <button type="button" id="msg-menu-cancel">Отмена</button>
</div>

<div id="dialog-menu" class="msg-menu" style="display:none">
  <button type="button" id="dialog-menu-del">🗑 Удалить чат</button>
  <button type="button" id="dialog-menu-cancel">Отмена</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js?v=23"></script>
</body>
</html>
