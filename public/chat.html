<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат — Конный клуб</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="chat-sidebar-head">
      <a href="/" class="back-link">← Расписание</a>
      <span class="chat-sidebar-title">Сообщения</span>
    </div>
    <div class="chat-search">
      <input type="text" id="user-search" placeholder="Найти пользователя...">
      <div id="search-results" class="search-results"></div>
    </div>
    <div class="chat-dialogs" id="dialogs-list"></div>
  </div>

  <div class="chat-main">
    <div class="chat-main-head">
      <div class="chat-main-name" id="chat-title">Выберите диалог</div>
    </div>
    <div class="chat-messages" id="messages-area"></div>
    <div class="chat-input-area">
      <textarea id="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
      <button id="send-btn">→</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>
</body>
</html>
