<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сменить пароль — Horseclub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <h2>Сменить пароль</h2>
      <p class="login-sub">Это нужно сделать при первом входе или если вы хотите обновить пароль</p>

      <div id="err" class="login-error" style="display:none"></div>
      <div id="ok" class="login-success" style="display:none"></div>

      <div class="field" id="old-wrap" style="display:none">
        <label>Текущий пароль</label>
        <input type="password" id="old_password" placeholder="Введите текущий пароль">
      </div>

      <div class="field">
        <label>Новый пароль</label>
        <input type="password" id="new_password" placeholder="минимум 6 символов">
      </div>

      <button id="save-btn">Сохранить</button>
    </div>
  </div>

  <script src="change-password.js"></script>
</body>
</html>
