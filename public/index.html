<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>График конного клуба</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <h1>График конного клуба</h1>
    <div class="date-nav">
      <button id="prev-day">←</button>
      <span id="current-date"></span>
      <button id="next-day">→</button>
    </div>
    <div class="user-info">
      <span id="user-name"></span>
      <button id="logout-btn">Выйти</button>
    </div>
  </div>

  <div class="schedule-wrap">
    <div class="schedule-grid" id="schedule-grid">
    </div>
  </div>
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Новая запись</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <div class="field">
      <label>Площадка</label>
      <select id="f-venue">
        <option value="Манеж">Манеж</option>
        <option value="Предманежник">Предманежник</option>
        <option value="Бочка">Бочка</option>
        <option value="Верхний плац">Верхний плац</option>
        <option value="Нижний плац">Нижний плац</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Дата</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Время</label>
        <select id="f-time"></select>
      </div>
    </div>

    <div class="field">
      <label>Продолжительность</label>
      <select id="f-dur">
        <option value="30">30 мин</option>
        <option value="45">45 мин</option>
        <option value="60" selected>60 мин</option>
        <option value="90">90 мин</option>
      </select>
    </div>

    <div class="field">
      <label>Лошадь</label>
      <input type="text" id="f-horse" placeholder="Кличка лошади">
    </div>

    <div class="field">
      <label>Дисциплина</label>
      <select id="f-disc">
        <option value="Конкур">Конкур</option>
        <option value="Выездка">Выездка</option>
      </select>
    </div>

    <div class="modal-buttons">
      <button id="modal-save">Сохранить</button>
      <button id="modal-cancel">Отмена</button>
    </div>
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
