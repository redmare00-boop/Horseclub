<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Конный клуб</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <h2>График конного клуба</h2>
      <p class="login-sub">Войдите чтобы добавлять записи</p>

      <div id="login-error" class="login-error" style="display:none"></div>

      <div class="field">
        <label>Логин</label>
        <input type="text" id="login-input" placeholder="Ваш логин">
      </div>

      <div class="field">
        <label>Пароль</label>
        <input type="password" id="password-input" placeholder="Ваш пароль">
      </div>

      <button id="login-btn">Войти</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
